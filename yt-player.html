<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Anfiteatro YouTube Player</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
        #player-container {
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
        }
        video {
            width: 100%; height: 100%;
            object-fit: contain; background: #000;
        }
        #loading {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #fff; font-family: -apple-system, sans-serif;
            font-size: 16px; text-align: center;
        }
        .spinner {
            width: 40px; height: 40px; margin: 0 auto 12px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #error {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #f87171; font-family: -apple-system, sans-serif;
            font-size: 14px; text-align: center; max-width: 80%;
            display: none;
        }
    </style>
</head>
<body>
    <div id="player-container">
        <video id="video" playsinline autoplay controls></video>
    </div>
    <div id="loading">
        <div class="spinner"></div>
        Loading video...
    </div>
    <div id="error"></div>

    <script>
        // ─── Configuration ───────────────────────────────────────────────
        // Invidious instances for video URL extraction (ad-free)
        const INVIDIOUS_INSTANCES = [
            'https://inv.nadeko.net',
            'https://invidious.nerdvpn.de',
            'https://invidious.jigsaw-security.com',
            'https://invidious.privacyredirect.com',
            'https://iv.ggtyler.dev',
            'https://invidious.protokollfansen.de',
        ];

        // ─── Parse params from URL ───────────────────────────────────────
        const params = new URLSearchParams(window.location.search);
        const videoId = params.get('v');
        const autoplay = params.get('autoplay') !== '0';

        const video = document.getElementById('video');
        const loadingEl = document.getElementById('loading');
        const errorEl = document.getElementById('error');

        function sendToRN(msg) {
            try {
                if (window.ReactNativeWebView) {
                    window.ReactNativeWebView.postMessage(JSON.stringify(msg));
                }
            } catch (e) {}
        }

        function showError(msg) {
            loadingEl.style.display = 'none';
            errorEl.style.display = 'block';
            errorEl.textContent = msg;
            sendToRN({ eventType: 'playerError', data: msg });
        }

        // ─── Fetch video URL from Invidious ──────────────────────────────
        async function fetchVideoUrl(vid) {
            // Try each instance until one works
            for (const instance of INVIDIOUS_INSTANCES) {
                try {
                    const res = await fetch(`${instance}/api/v1/videos/${vid}?fields=formatStreams,adaptiveFormats,title`, {
                        signal: AbortSignal.timeout(8000),
                    });
                    if (!res.ok) continue;
                    const data = await res.json();

                    // Prefer formatStreams (combined audio+video, progressive)
                    // Sort by quality: 720p > 360p > 1080p (1080p is often too heavy)
                    if (data.formatStreams && data.formatStreams.length > 0) {
                        // Sort: prefer 720p, then 480p, then higher
                        const sorted = [...data.formatStreams].sort((a, b) => {
                            const qualA = parseInt(a.qualityLabel) || 0;
                            const qualB = parseInt(b.qualityLabel) || 0;
                            // Prefer 720p
                            const distA = Math.abs(qualA - 720);
                            const distB = Math.abs(qualB - 720);
                            return distA - distB;
                        });
                        return { url: sorted[0].url, title: data.title || '' };
                    }

                    // Fallback: adaptiveFormats (video-only, need separate audio)
                    // Just use the best video+audio combined format
                    if (data.adaptiveFormats) {
                        const videoFormats = data.adaptiveFormats
                            .filter(f => f.type && f.type.startsWith('video/') && f.encoding !== 'vp9')
                            .sort((a, b) => (b.bitrate || 0) - (a.bitrate || 0));
                        if (videoFormats.length > 0) {
                            return { url: videoFormats[0].url, title: data.title || '' };
                        }
                    }
                } catch (e) {
                    // Try next instance
                    continue;
                }
            }
            return null;
        }

        // ─── Initialize Player ───────────────────────────────────────────
        async function init() {
            if (!videoId) {
                showError('No video ID provided');
                return;
            }

            sendToRN({ eventType: 'playerLoading' });

            const result = await fetchVideoUrl(videoId);
            if (!result) {
                showError('Could not load video. All sources unavailable.');
                return;
            }

            video.src = result.url;
            video.load();

            video.addEventListener('loadeddata', () => {
                loadingEl.style.display = 'none';
                sendToRN({ eventType: 'playerReady' });
            });

            video.addEventListener('play', () => {
                sendToRN({ eventType: 'playerStateChange', data: 1 }); // YT.PlayerState.PLAYING
            });

            video.addEventListener('pause', () => {
                sendToRN({ eventType: 'playerStateChange', data: 2 }); // YT.PlayerState.PAUSED
            });

            video.addEventListener('ended', () => {
                sendToRN({ eventType: 'playerStateChange', data: 0 }); // YT.PlayerState.ENDED
            });

            video.addEventListener('error', () => {
                showError('Video playback error');
            });

            if (autoplay) {
                video.play().catch(() => {
                    // Autoplay blocked — user will need to tap play
                });
            }
        }

        // ─── Listen for commands from React Native ───────────────────────
        window.addEventListener('message', function(event) {
            try {
                const msg = JSON.parse(event.data);
                switch (msg.eventName) {
                    case 'playVideo': video.play(); break;
                    case 'pauseVideo': video.pause(); break;
                    case 'muteVideo': video.muted = true; break;
                    case 'unMuteVideo': video.muted = false; break;
                    case 'setVolume': video.volume = (msg.meta?.volume || 100) / 100; break;
                    case 'seekTo': video.currentTime = msg.meta?.seconds || 0; break;
                }
            } catch (e) {}
        });

        init();
    </script>
</body>
</html>
